device_name = "ktane-timer"
software_version = "001"
hardware_version = "1"
heartbeat_period = 1000
autostart = "enabled"

[identity]
vendor_id = 0xCAFE
product_code = 1032
revision_number = 1

[pdos]
num_tpdo = 4
num_rpdo = 4

[[objects]]
index = 0x2000
parameter_name = "Tick Count TX"
object_type = "var"
data_type = "uint32"
access_type = "rw"
default_value = 0
pdo_mapping = "tpdo"

[[objects]]
index = 0x2001
parameter_name = "Tick Count RX"
object_type = "var"
data_type = "uint32"
access_type = "rw"
default_value = 0
pdo_mapping = "rpdo"

